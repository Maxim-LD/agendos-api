openapi: 3.0.0
info:
  title: Agendos Backend API
  description: API documentation for Agendos - Task Management and Learning Platform
  version: 1.0.0
  contact:
    name: Agendos Team
    url: https://agendos.vercel.app

servers:
  - url: http://localhost:3200/api/v1
    description: Development Server
  - url: https://agendos-api.onrender.com/api/v1
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token in Bearer format (obtained from login/signup)

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullname:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        status:
          type: string
        occupation:
          type: string
        is_email_verified:
          type: boolean
        maximum_daily_capacity:
          type: number
      required:
        - id
        - fullname
        - email
        - is_email_verified
        - maximum_daily_capacity

    UserProfile:
      type: object
      properties:
        username:
          type: string
        status:
          type: string
        occupation:
          type: string
        phone:
          type: string
        maximum_daily_capacity:
          type: number
        date_of_birth:
          type: string
          format: date

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [not_started, ongoing, completed]
        effort_estimate_minutes:
          type: number
        progress_percentage:
          type: number
          minimum: 0
          maximum: 100
        progress_interval:
          type: string
          enum: [once, daily, weekly, monthly]
        due_date:
          type: string
          format: date-time
        urgency:
          type: string
          enum: [low, medium, high]
        reminders:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - title
        - status
        - effort_estimate_minutes
        - urgency

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error_code:
          type: string
        statusCode:
          type: number

paths:
  /health:
    get:
      tags:
        - Health
      summary: Check API health
      description: Simple health check endpoint
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: SecurePassword123!
                confirm_password:
                  type: string
                  format: password
                  example: SecurePassword123!
              required:
                - fullname
                - email
                - password
                - confirm_password
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          accessToken:
                            type: string
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refresh-token=abcde12345; Path=/; HttpOnly
        '400':
          description: Bad request - validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  format: email | phone
                  example: john@example.com | +2340000000000
                password:
                  type: string
                  format: password
                  example: SecurePassword123!
              required:
                - email or phone
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          accessToken:
                            type: string
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refresh-token=abcde12345; Path=/; HttpOnly
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many login attempts

  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get a new access token using the refresh token from cookies
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
        '401':
          description: Unauthorized - invalid or missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/send-email-verification:
    post:
      tags:
        - Authentication
      summary: Request email verification
      description: Send verification email to user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required:
                - email
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests

  /auth/verify-email:
    get:
      tags:
        - Authentication
      summary: Verify email address
      description: Verify user email using token from verification link
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Email verification token from the verification link
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset link to user email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required:
                - email
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Reset user password using reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Password reset token from email
                password:
                  type: string
                  format: password
                confirm_password:
                  type: string
                  format: password
              required:
                - token
                - password
                - confirm_password
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/onboarding:
    patch:
      tags:
        - User
      summary: Complete user onboarding
      description: Complete user profile setup during onboarding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: Onboarding completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks:
    post:
      tags:
        - Tasks
      summary: Create a new task
      description: Create a new task for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Complete project documentation
                description:
                  type: string
                  example: Write comprehensive API documentation
                due_date:
                  type: string
                  format: date-time
                effort_estimate_minutes:
                  type: number
                  example: 120
                energy_required:
                  type: string
                  enum: [light, moderate, intense]
                  example: moderate
                progress_interval:
                  type: string
                  enum: [once, daily, weekly, monthly]
                  example: once
                urgency:
                  type: string
                  enum: [low, medium, high]
                  example: high
                reminders:
                  type: boolean
                  example: true
                project_id:
                  type: string
                  format: uuid
              required:
                - title
                - energy_required
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Task'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Tasks
      summary: Get user tasks
      description: Retrieve all tasks for the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [not_started, ongoing, completed]
          description: Filter by task status
        - name: urgency
          in: query
          schema:
            type: string
            enum: [low, medium, high]
          description: Filter by urgency
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            default: 10
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get task by ID
      description: Retrieve a specific task by its ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Task ID
      responses:
        '200':
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: User
    description: User profile and account management
  - name: Tasks
    description: Task management endpoints
